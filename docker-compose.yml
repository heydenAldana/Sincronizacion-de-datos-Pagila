version: "3.9"

services:

  master_db:
    image: postgres:15-alpine
    container_name: sync_master
    restart: unless-stopped
    environment:
      POSTGRES_USER: pagila_user
      POSTGRES_PASSWORD: masterpass123
      POSTGRES_DB: pagila
    volumes:
      - ./db/master:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sync_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pagila_user -d pagila"]
      interval: 10s
      timeout: 5s
      retries: 5

  slave_db:
    image: mysql:8.0
    container_name: sync_slave
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: pagila_slave
      MYSQL_USER: slave_user
      MYSQL_PASSWORD: slavepass123
    volumes:
      - ./db/slave:/docker-entrypoint-initdb.d
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - sync_net
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "slave_user", "-pslavepass123"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sync_backend
    restart: unless-stopped
    environment:
      MASTER_HOST: master_db
      MASTER_PORT: 5432
      MASTER_DB: pagila
      MASTER_USER: pagila_user
      MASTER_PASSWORD: masterpass123
      SLAVE_HOST: slave_db
      SLAVE_PORT: 3306
      SLAVE_DB: pagila_slave
      SLAVE_USER: slave_user
      SLAVE_PASSWORD: slavepass123
    volumes:
      - ./mapping.json:/app/mapping.json
      - sync_logs:/app/logs
    ports:
      - "5000:5000"
    depends_on:
      master_db:
        condition: service_healthy
      slave_db:
        condition: service_healthy
    networks:
      - sync_net

volumes:
  pgdata:
  mysqldata:
  sync_logs:

networks:
  sync_net:
    driver: bridge
